services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: cjlass2
      POSTGRES_USER: cjlass2
      POSTGRES_PASSWORD: cjlass2
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cjlass2 -d cjlass2"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 768m
    mem_reservation: 384m
    cpus: "0.80"
    pids_limit: 256

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${REDIS_BIND:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.25"
    pids_limit: 128

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=256
      PORT: 3001
      DATABASE_URL: postgres://cjlass2:cjlass2@postgres:5432/cjlass2
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:5173}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      WECOM_CALLBACK_SECRET: ${WECOM_CALLBACK_SECRET:-}
      HERMES_AGENT_URL: ${HERMES_AGENT_URL:-}
      HERMES_AGENT_API_KEY: ${HERMES_AGENT_API_KEY:-}
      HERMES_MODEL: ${HERMES_MODEL:-}
      HERMES_TIMEOUT_MS: ${HERMES_TIMEOUT_MS:-8000}
      NOTIFICATION_PROVIDER_MODE: ${NOTIFICATION_PROVIDER_MODE:-}
      NOTIFICATION_WEBHOOK_URL: ${NOTIFICATION_WEBHOOK_URL:-}
      WECOM_WEBHOOK_URL: ${WECOM_WEBHOOK_URL:-}
      WECHAT_WEBHOOK_URL: ${WECHAT_WEBHOOK_URL:-}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      FEISHU_WEBHOOK_SECRET: ${FEISHU_WEBHOOK_SECRET:-}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL:-}
      NOTIFICATION_WORKER_ENABLED: ${NOTIFICATION_WORKER_ENABLED:-true}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@cjlass.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
    ports:
      - "${API_PORT:-3001}:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      default:
      web-gateway:
        aliases:
          - cjlass2-api
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.75"
    pids_limit: 256

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:3001/api/v1}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    networks:
      default:
      web-gateway:
        aliases:
          - cjlass2-web
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 384m
    mem_reservation: 128m
    cpus: "0.35"
    pids_limit: 128

  edge:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
      - "${EDGE_HTTPS_PORT:-443}:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
      PUBLIC_IP: ${PUBLIC_IP:-127.0.0.1}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      webhook:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:2019/config/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 128m
    mem_reservation: 32m
    cpus: "0.20"
    pids_limit: 128

  webhook:
    build:
      context: ./infra/webhook
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      NOTIFICATION_PROVIDER: ${NOTIFICATION_PROVIDER:-}
      NOTIFICATION_WEBHOOK_URL: ${NOTIFICATION_WEBHOOK_URL:-}
      PROJECT_DIR: /project
      LOG_DIR: /project/logs/deploy
      DEPLOY_BRANCH: ${DEPLOY_BRANCH:-main}
    ports:
      - "${WEBHOOK_PORT:-127.0.0.1:9000}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - .:/project:rw
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    mem_reservation: 32m
    cpus: "0.25"
    pids_limit: 64

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  web-gateway:
    external: true
