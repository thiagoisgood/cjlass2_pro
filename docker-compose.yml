services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: cjlass2
      POSTGRES_USER: cjlass2
      POSTGRES_PASSWORD: cjlass2
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cjlass2 -d cjlass2"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 768m
    mem_reservation: 384m
    cpus: "0.80"
    pids_limit: 256

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    mem_reservation: 64m
    cpus: "0.25"
    pids_limit: 128

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=256
      PORT: 3001
      DATABASE_URL: postgres://cjlass2:cjlass2@postgres:5432/cjlass2
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-http://127.0.0.1:5173}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      WECOM_CALLBACK_SECRET: ${WECOM_CALLBACK_SECRET:-}
      NOTIFICATION_PROVIDER_MODE: ${NOTIFICATION_PROVIDER_MODE:-mock}
      NOTIFICATION_WORKER_ENABLED: ${NOTIFICATION_WORKER_ENABLED:-true}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@cjlass.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      default:
      web-gateway:
        aliases:
          - cjlass2-api
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "0.75"
    pids_limit: 256

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:3001/api/v1}
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    networks:
      default:
      web-gateway:
        aliases:
          - cjlass2-web
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 384m
    mem_reservation: 128m
    cpus: "0.35"
    pids_limit: 128

volumes:
  postgres-data:

networks:
  web-gateway:
    external: true
